name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 0.2.0). Required for manual runs."
        required: true
        type: string

permissions:
  contents: read

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.derive.outputs.version }}
    steps:
      - id: derive
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            RAW="${{ github.event.release.tag_name }}"
          else
            RAW="${{ inputs.version }}"
          fi
          VERSION="${RAW#v}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver (expected X.Y.Z)."
            exit 1
          fi
          echo "Resolved version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  publish-python:
    needs: resolve-version
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set version in pyproject.toml
        run: |
          cd python
          python - <<'PY'
          import os, re, pathlib
          version = os.environ["VERSION"]
          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          new, count = re.subn(r'(?m)^version = "[^"]+"', f'version = "{version}"', text, count=1)
          if count == 0:
              raise SystemExit("No version line found in pyproject.toml")
          path.write_text(new)
          print(f"pyproject.toml version set to {version}")
          PY
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
      - name: Build Python package
        run: |
          pip install build
          cd python
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist/

  publish-node:
    needs: resolve-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - name: Set version in package.json
        run: |
          cd node
          npm version --no-git-tag-version --allow-same-version "$VERSION"
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
      - name: Prepare npm trusted publishing
        run: |
          node --version
          npm --version
          npm install -g npm@latest
          npm --version
          NPMRC_PATH="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$NPMRC_PATH" ]; then
            sed -i '/_authToken/d' "$NPMRC_PATH"
          fi
          if [ -f "$HOME/.npmrc" ] && [ "$HOME/.npmrc" != "$NPMRC_PATH" ]; then
            sed -i '/_authToken/d' "$HOME/.npmrc"
          fi
          npm config set registry https://registry.npmjs.org/
      - name: Build and publish Node package
        run: |
          cd node
          npm ci
          unset NODE_AUTH_TOKEN
          unset NPM_TOKEN
          npm publish --access public --provenance
      - name: Upload npm debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs/*.log
          if-no-files-found: ignore
