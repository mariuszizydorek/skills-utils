name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install and test
        run: |
          pip install -e "./python[dev]" --index-url https://pypi.org/simple/
          cd python
          pytest -v -m "not integration"

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: node/package-lock.json
      - name: Install, build, and test
        run: |
          cd node
          npm ci
          npm run build
          npm test
